# Déploiement Hostinger — Compose from URL
# Secrets : les ajouter dans l'UI Hostinger (Update du projet), pas ici.

services:
  app:
    image: oryzons/azur:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - azur_data:/data
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: file:/data/azur.db

volumes:
  azur_data:
