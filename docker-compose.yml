# Déploiement Hostinger — Compose manuel ou "Compose from URL"
# Image : ghcr.io/oryzons/azur:latest
#
# Variables sensibles : les renseigner dans l'UI Hostinger (section environment)
# ou via un fichier .env sur le VPS (ne pas committer).

services:
  app:
    image: ghcr.io/oryzons/azur:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - azur_data:/data
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: file:/data/azur.db
      # Renseigner dans Hostinger :
      # ADMIN_URL: https://ton-domaine.com
      # PUBLIC_APP_URL: https://ton-domaine.com
      # JWT_ACCESS_SECRET: ...
      # JWT_REFRESH_SECRET: ...
      # RESEND_API_KEY: ...
      # STRIPE_SECRET_KEY: ...
      # STRIPE_WEBHOOK_SECRET: ...

volumes:
  azur_data:
